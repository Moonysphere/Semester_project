<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design guide</title>
  <link rel="stylesheet" href="/src/css/main.scss" />
  <script type="module" src="/src/js/main.js"></script>
</head>

<body>

  <!-- BOUTON TOGGLE MOBILE -->
  <button class="sidebar-toggle" id="sidebarToggle">☰</button>

  <!-- OVERLAY MOBILE -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">

    <!-- HEADER -->
    <div class="sidebar__header">
      <div class="sidebar__logo">
        <img src="/src/assets/icon_sidebar/logo.svg" alt="logo" class="">
      </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="sidebar__nav">

      <!-- Section Contenu -->
      <ul class="sidebar__menu">
        <li class="sidebar__menu-item">
          <a href="#" class="sidebar__link">
            <img src="/src/assets/icon_sidebar/icon_perso.svg" alt="logo" class="">
          </a>
        </li>
        <li class="sidebar__menu-item">
          <a href="#" class="sidebar__link">
            <img src="/src/assets/icon_sidebar/icon_uni.svg" alt="logo" class="">
          </a>
        </li>
        <li class="sidebar__menu-item">
          <a href="#" class="sidebar__link">
            <img src="/src/assets/icon_sidebar/icon_place.svg" alt="logo" class="">
          </a>
        </li>
        <li class="sidebar__menu-item">
          <a href="#" class="sidebar__link">
            <img src="/src/assets/icon_sidebar/icon_rules.svg" alt="logo" class="">
          </a>
        </li>
        <li class="sidebar__menu-item">
          <a href="#" class="sidebar__link">
            <img src="/src/assets/icon_sidebar/icon_settings.svg" alt="logo" class="">
          </a>
        </li>
      </ul>

    </nav>

    <!-- FOOTER / PROFIL -->
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">JD</div>
      </div>
    </div>

  </aside>

  <!-- ========== CONTENU PRINCIPAL ========== -->
  <main class="main-content">
    <div class="container">
      <section>
        <h2>.button</h2>
        <p>
          <button class="button button--lg button--primary">Bouton</button>
          <button class="button button--primary">Bouton</button>
          <button class="button button--sm button--primary">Bouton</button>
        </p>
        <p>
          <button class="button button--lg button--secondary">Bouton</button>
          <button class="button button--secondary">Bouton</button>
          <button class="button button--sm button--secondary">Bouton</button>
        </p>
        <p>
          <a href="#" class="button button--lg button--danger">Bouton</a>
          <a href="#" class="button button--danger">Bouton</a>
          <a href="#" class="button button--sm button--danger">Bouton</a>
        </p>
      </section>

      <section>
        <h2>.card</h2>
        <div style="display: flex; gap: 1rem; align-items: flex-start">
          <article class="card">
            <div class="card__content">
              <h2 class="card__title_main-font">CHARACTER</h2>
              <h2 class="card__title_secondary-font">NAME</h2>
              <p class="card__text">
                Some quick example text to build on the card title and make up
                the bulk of the card's content.
              </p>
              <a href="#" class="button button--primary p--6">Button</a>
            </div>
            <img src=" " alt="" class="card__image" />
          </article>
        </div>
      </section>
    </div>
  </main>

  <!-- JAVASCRIPT POUR TOGGLE MOBILE -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    // Ouvrir/fermer la sidebar sur mobile
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
      sidebarOverlay.classList.toggle('active');
    });

    // Fermer en cliquant sur l'overlay
    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('active');
      sidebarOverlay.classList.remove('active');
    });
  </script>

</body>

</html>
