<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design guide</title>
  <link rel="stylesheet" href="/src/css/main.scss" />
  <script type="module" src="/src/js/main.js"></script>
</head>

<body>

  <!-- Sidebar Component -->
  <div class="sidebar-container">
    <style>

    </style>

    <div class="sidebar" id="sidebar">
      <!-- Header -->
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <img src="./src/assets/icon_sidebar/logo.svg" alt="">
          </div>
          <span class="sidebar-logo-text">Lorebase</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
            <path d="M9 4v16"></path>
            <path d="M14 10l2 2l-2 2"></path>
          </svg>
        </button>
      </div>

      <!-- Menu -->
      <nav class="sidebar-menu">
        <!-- Home -->
        <div class="sidebar-item" data-tooltip="Personnage">
          <a href="#home" class="sidebar-link active">
            <img src="./src/assets/icon_sidebar/icon_perso.svg" alt="Icône personnage">
            <span class="sidebar-text">Personnage</span>
          </a>
        </div>

        <!-- Dashboard -->
        <div class="sidebar-item" data-tooltip="Place">
          <a href="#home" class="sidebar-link active">
            <img src="./src/assets/icon_sidebar/icon_place.svg" alt="Icône place">
            <span class="sidebar-text">Place</span>
          </a>
        </div>

        <!-- Projects -->
        <div class="sidebar-item" data-tooltip="Règle">
          <a href="#home" class="sidebar-link active">
            <img src="./src/assets/icon_sidebar/icon_rules.svg" alt="Icône règle">
            <span class="sidebar-text">Règle</span>
          </a>
        </div>

        <!-- Messages -->
        <div class="sidebar-item" data-tooltip="Paramètre">
          <a href="#home" class="sidebar-link active">
            <img src="./src/assets/icon_sidebar/icon_settings.svg" alt="Icône paramètre">
            <span class="sidebar-text">Paramètre</span>
          </a>
        </div>

        <div class="sidebar-item" data-tooltip="Univers">
          <a href="#home" class="sidebar-link active">
            <img src="./src/assets/icon_sidebar/icon_uni.svg" alt="Icône uni">
            <span class="sidebar-text">"Univers</span>
          </a>
        </div>

        <!-- Divider -->
        <div class="sidebar-divider"></div>

        <!-- Settings -->
        <div class="sidebar-item" data-tooltip="Paramètres">
          <a href="#settings" class="sidebar-link">
            <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94-1.543.826-3.31 2.37-2.37c1 .608 2.296.07 2.572-1.065z">
              </path>
              <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
            </svg>
            <span class="sidebar-text">Paramètres</span>
          </a>
        </div>
      </nav>

      <!-- Footer -->
      <div class="sidebar-footer">
        <div class="sidebar-item" data-tooltip="Déconnexion">
          <a href="#logout" class="sidebar-link">
            <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2">
              </path>
              <path d="M9 12h12l-3 -3"></path>
              <path d="M18 15l3 -3"></path>
            </svg>
            <span class="sidebar-text">Déconnexion</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script>
    // Toggle sidebar
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarContainer = document.querySelector('.sidebar-container');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('closed');

      // Dispatch event pour ajuster le contenu principal
      window.dispatchEvent(new CustomEvent('sidebar-toggle', {
        detail: { isClosed: sidebar.classList.contains('closed') }
      }));
    });

    // Fermer sur mobile avec overlay
    sidebarOverlay.addEventListener('click', () => {
      sidebarContainer.classList.remove('mobile-open');
    });

    // Active link
    const links = document.querySelectorAll('.sidebar-link');
    links.forEach(link => {
      link.addEventListener('click', function (e) {
        links.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>

  <!-- ========== CONTENU PRINCIPAL ========== -->
  <main class="main-content">
    <div class="container">
      <section>
        <h2>.button</h2>
        <p>
          <button class="button button--lg button--primary">Bouton</button>
          <button class="button button--primary">Bouton</button>
          <button class="button button--sm button--primary">Bouton</button>
        </p>
        <p>
          <button class="button button--lg button--secondary">Bouton</button>
          <button class="button button--secondary">Bouton</button>
          <button class="button button--sm button--secondary">Bouton</button>
        </p>
        <p>
          <a href="#" class="button button--lg button--danger">Bouton</a>
          <a href="#" class="button button--danger">Bouton</a>
          <a href="#" class="button button--sm button--danger">Bouton</a>
        </p>
      </section>

      <section>
        <h2>.card</h2>
        <div style="display: flex; gap: 1rem; align-items: flex-start">
          <article class="card">
            <div class="card__content">
              <div class="card__image">
                <img src="/src/assets/icon_sidebar/icon_perso.svg" alt="logo" class="">
              </div>
              <h2 class="card__title_main-font">CHARACTER</h2>
              <p class="card__text">
                Some quick example text to build on the card title and make up
                the bulk of the card's content.
              </p>
              <a href="#" class="button button--primary p--6">Button</a>
            </div>
          </article>
        </div>
      </section>
    </div>
  </main>


</body>

</html>
