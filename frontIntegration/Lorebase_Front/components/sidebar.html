<!-- Sidebar Component -->
<div class="sidebar-container">
  <style></style>

  <div class="sidebar" id="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
      <button
        class="sidebar-toggle"
        id="sidebarToggle"
        aria-label="Toggle sidebar"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"
          ></path>
          <path d="M9 4v16"></path>
          <path d="M14 10l2 2l-2 2"></path>
        </svg>
      </button>
    </div>

    <!-- Menu -->
    <nav class="sidebar-menu">
      <!-- Home -->
      <div class="sidebar-item" data-tooltip="Accueil">
        <a href="#home" class="sidebar-link active">
          <svg
            class="sidebar-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
            <path
              d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
            ></path>
          </svg>
          <span class="sidebar-text">Accueil</span>
        </a>
      </div>

      <!-- Dashboard -->
      <div class="sidebar-item" data-tooltip="Tableau de bord">
        <a href="#dashboard" class="sidebar-link">
          <svg
            class="sidebar-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M3 9h18"></path>
            <path d="M9 21V9"></path>
          </svg>
          <span class="sidebar-text">Tableau de bord</span>
        </a>
      </div>

      <!-- Projects -->
      <div class="sidebar-item" data-tooltip="Projets">
        <a href="#projects" class="sidebar-link">
          <svg
            class="sidebar-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M3 7m0 2a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"
            ></path>
            <path d="M8 7v-2a2 2 0 0 1 2 -2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          <span class="sidebar-text">Projets</span>
        </a>
      </div>

      <!-- Messages -->
      <div class="sidebar-item" data-tooltip="Messages">
        <a href="#messages" class="sidebar-link">
          <svg
            class="sidebar-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M8 9h8"></path>
            <path d="M8 13h6"></path>
            <path
              d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12z"
            ></path>
          </svg>
          <span class="sidebar-text">Messages</span>
        </a>
      </div>

      <!-- Divider -->
      <div class="sidebar-divider"></div>

      <!-- Settings -->
      <div class="sidebar-item" data-tooltip="Paramètres">
        <a href="#settings" class="sidebar-link">
          <svg
            class="sidebar-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94-1.543.826-3.31 2.37-2.37c1 .608 2.296.07 2.572-1.065z"
            ></path>
            <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
          </svg>
          <span class="sidebar-text">Paramètres</span>
        </a>
      </div>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-user-section">
        <a href="/user/profile" class="sidebar-link sidebar-username">
          <span class="sidebar-icon sidebar-user-avatar">A</span>
          <span class="sidebar-text">Utilisateur</span>
        </a>
        <form method="POST" action="/logout" class="sidebar-logout-form">
          <button type="submit" class="sidebar-link sidebar-logout-btn">
            <svg
              class="sidebar-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"
              ></path>
              <path d="M9 12h12l-3 -3"></path>
              <path d="M18 15l3 -3"></path>
            </svg>
            <span class="sidebar-text">Déconnexion</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
  // Toggle sidebar
  const sidebar = document.getElementById("sidebar");
  const sidebarToggle = document.getElementById("sidebarToggle");
  const sidebarContainer = document.querySelector(".sidebar-container");
  const sidebarOverlay = document.getElementById("sidebarOverlay");

  sidebarToggle.addEventListener("click", () => {
    sidebar.classList.toggle("closed");

    // Dispatch event pour ajuster le contenu principal
    window.dispatchEvent(
      new CustomEvent("sidebar-toggle", {
        detail: { isClosed: sidebar.classList.contains("closed") },
      }),
    );
  });

  // Fermer sur mobile avec overlay
  sidebarOverlay.addEventListener("click", () => {
    sidebarContainer.classList.remove("mobile-open");
  });

  // Active link
  const links = document.querySelectorAll(".sidebar-link");
  links.forEach((link) => {
    link.addEventListener("click", function (e) {
      links.forEach((l) => l.classList.remove("active"));
      this.classList.add("active");
    });
  });
</script>
