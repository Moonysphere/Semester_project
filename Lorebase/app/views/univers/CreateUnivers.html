<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un Univers</title>
  <script>
    const theme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../src/style/css/framework.css">
  <link rel="stylesheet" href="../../src/style/css/univers/Createunivers.css">
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
</head>

<body>
  <h1>Créer un Univers</h1>

  <form method="POST" action="/univers">
    <div class="form-group">
      <label for="name">Nom de l'univers :</label>
      <input type="text" id="name" name="name" required />
    </div>

    <div class="form-group">
      <label for="description">Description :</label>
      <textarea id="description" name="description"></textarea>
    </div>

    <div class="form-group">
      <label for="createdate">Date de création :</label>
      <input type="date" id="createdate" name="createdate" />
    </div>

    <button class="create" type="submit" name="status" value="published">
      Créer l'univers
    </button>
    <button class="brouillon" type="submit" name="status" value="draft">
      Brouillon
    </button>
    <button class="archived" type="submit" name="status" value="archived">
      Archiver
    </button>
  </form>
</body>

</html>
