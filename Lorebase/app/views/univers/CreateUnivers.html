<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    const theme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <title>Créer un Univers</title>
  <style>
    body {
      background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    form {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 5px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background-color: #4caf50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #45a049;
    }

    .create {
      background-color: #4caf50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    .create:hover {
      background-color: #45a049;
    }

    .brouillon {
      background-color: #f0ad4e;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    .brouillon:hover {
      background-color: #ec971f;
    }

    .archived {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>

<body>
  <h1>Créer un Univers</h1>
  <form method="POST" action="/univers">
    <div class="form-group">
      <label for="name">Nom de l’univers :</label>
      <input type="text" id="name" name="name" required />
    </div>
    <div class="form-group">
      <label for="description">Description :</label>
      <textarea id="description" name="description"></textarea>
    </div>
    <div class="form-group">
      <label for="createDate">Date de création :</label>
      <input type="date" name="createdate" />
    </div>
    <button class="create" type="submit" name="status" value="published">
      Créer l'univers
    </button>
    <button class="brouillon" type="submit" name="status" value="draft">
      Brouillon
    </button>
    <button class="archived" type="submit" name="status" value="archived">
      Archiver
    </button>
  </form>
</body>

</html>
