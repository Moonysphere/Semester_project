<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modifier <?php echo htmlspecialchars($univers->name); ?></title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-top: 0;
      }
      .form-group {
        margin: 20px 0;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
      }
      .btn-submit:hover {
        background-color: #218838;
      }
      .btn-cancel {
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        display: inline-block;
      }
      .btn-cancel:hover {
        background-color: #5a6268;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        Modifier
        <?php echo htmlspecialchars($univers->name); ?>
      </h1>
      <form id="editForm">
        <div class="form-group">
          <label for="name">Nom :</label>
          <input
            type="text"
            id="name"
            name="name"
            value="<?php echo htmlspecialchars($univers->name); ?>"
            required
          />
        </div>
        <div class="form-group">
          <label for="description">description :</label>
          <input
            type="text"
            id="description"
            name="description"
            value="<?php echo htmlspecialchars($univers->description); ?>"
            required
          />
        </div>
        
        <div class="buttons">
          <button type="submit" class="btn btn-submit">Sauvegarder</button>
          <a
            href="/univers/<?php echo $univers->id; ?>"
            class="btn btn-cancel"
            >Annuler</a
          >
        </div>
      </form>
    </div>

    <script>
      document
        .getElementById("editForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);
          fetch(`/univers/<?php echo $univers->id; ?>`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then((response) => {
              if (response.ok) {
                window.location.href = `/univers/<?php echo $univers->id; ?>`;
              } else {
                alert("Erreur lors de la modification");
              }
            })
            .catch((error) => {
              console.error("Erreur:", error);
              alert("Erreur lors de la modification");
            });
        });
    </script>
  </body>
</html>
