<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    <?php echo htmlspecialchars($quest->title); ?>
  </title>
  <script>
    const theme =
      localStorage.getItem("theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light");
    document.documentElement.setAttribute("data-theme", theme);
  </script>
  <link rel="stylesheet" href="../../src/style/css/framework.css" />
  <link rel="stylesheet" href="../../src/style/css/quest/detail.css" />
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
</head>

<body>
  <div class="container">
    <h1>
      <?php echo htmlspecialchars($quest->title); ?>
    </h1>

    <div class="field">
      <label>Description :</label>
      <p>
        <?php echo htmlspecialchars($quest->description); ?>
      </p>
    </div>

    <div class="field">
      <label>Statut de la quête :</label>
      <p>
        <?php echo htmlspecialchars($quest->statut_quest); ?>
      </p>
    </div>
    <div class="field">
      <label>Level Requirement :</label>
      <p>
        <?php echo htmlspecialchars($quest->levelrequirements); ?>
      </p>
    </div>
    <div class="field">
      <label>Début de la quête :</label>
      <p>
        <?= htmlspecialchars($placeName ?? 'Non défini') ?>
      </p>
    </div>
    <div class="field">
      <label>Univers :</label>
      <p>
        <?= htmlspecialchars($universName ?? 'Non défini') ?>
      </p>
    </div>
    <div class="field">
      <label>Status :</label>
      <p>
        <?php echo htmlspecialchars($quest->status); ?>
      </p>
    </div>

    <div class="buttons">
      <a href="/quest" class="btn btn-back">Retour</a>
      <a href="/quest/<?php echo $quest->slug; ?>/edit" class="btn"
        style="background-color: #ffc107; color: black">Modifier</a>
      <button type="button" class="btn btn-delete" onclick="deleteQuest(<?php echo $quest->id; ?>)">
        Supprimer
      </button>
    </div>
  </div>

  <script>
    function deleteQuest(id) {
      if (confirm("Êtes-vous sûr de vouloir supprimer cette quête ?")) {
        fetch(`/quest/${id}`, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
          },
        }).then((response) => {
          if (response.ok) {
            window.location.href = "/quest";
          } else {
            alert("Erreur lors de la suppression");
          }
        });
      }
    }
  </script>
</body>

</html>
