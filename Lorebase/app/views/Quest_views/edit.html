<html lang="fr">

  <title>Modifier
    <?php echo htmlspecialchars($quest->title); ?>
  </title>
  <link rel="stylesheet" href="../../src/style/css/framework.css" />
  <link rel="stylesheet" href="../../src/style/css/quest/edit.css" />
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
  <script>
    const theme =
      localStorage.getItem("theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light");
    document.documentElement.setAttribute("data-theme", theme);
  </script>
</head>

<body>
  <div class="container">
    <h1>Modifier
      <?php echo htmlspecialchars($quest->title); ?>
    </h1>

    <form id="editForm">
      <div class="form-group">
        <label for="title">Titre :</label>
        <input type="text" id="title" name="title" value="<?php echo htmlspecialchars($quest->title); ?>" required />
      </div>

      <div class="form-group">
        <label for="description">Description :</label>
        <input type="text" id="description" name="description"
          value="<?php echo htmlspecialchars($quest->description); ?>" required />
      </div>

      <div class="form-group">
        <label for="statut_quest">Statut de la quête :</label>
        <input type="text" id="statut_quest" name="statut_quest"
          value="<?php echo htmlspecialchars($quest->statut_quest); ?>" required />
        <input id="statut" name="statut" value="<?php echo htmlspecialchars($quest->statut); ?>" required />
        required />
      </div>

      <div class="form-group">
        <label for="levelrequirement">Level Requirement :</label>
        <input type="number" id="levelrequirement" name="levelrequirement"
          value="<?php echo htmlspecialchars($quest->levelrequirement); ?>" required />
      </div>
      <div class="form-group">
        <label for="place_id">Début de la quête :</label>
        <select id="place_id" name="place_id" required>
          <option value="">-- Choisir un lieu de départ --</option>
          <?php foreach ($places as $place): ?>
          <option value="<?= $place->id ?>" title="<?= htmlspecialchars($place->description ?? '') ?>">
            <?= htmlspecialchars($place->name) ?>
          </option>
          <?php endforeach; ?>
        </select>
      </div>
      <div class="form-group">
        <label for="univers_id">Univers</label>
        <select id="univers_id" name="univers_id" required>
          <option value="">-- Choisir un univers --</option>
          <?php foreach ($universes as $univers): ?>
          <option value="<?= $univers->id ?>" title="<?= htmlspecialchars($univers->description ?? '') ?>">
            <?= htmlspecialchars($univers->name) ?>
          </option>
          <?php endforeach; ?>
        </select>
        value="
        <?php echo htmlspecialchars($quest->levelrequirements ?? ''); ?>" />
      </div>

      <div class="buttons">
        <button type="submit" class="btn btn-submit" name="status" value="published">
          Publier
        </button>

        <button type="submit" class="btn btn-draft" name="status" value="draft">
          Brouillon
        </button>

        <button type="submit" class="btn btn-archived" name="status" value="archived">
          Archiver
        </button>
      </div>
    </form>

    <div class="buttons" style="margin-top: 10px;">
      <a href="/quest/<?php echo $quest->slug; ?>" class="btn btn-cancel">
        Annuler
      </a>
    </div>

    <script>
      document
        .getElementById("editForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const submitter = e.submitter;
          const statusValue = submitter ? submitter.value : null;
          const formData = new FormData(this);
          const data = {};
          for (let [key, value] of formData.entries()) {
            if (value !== "" && value !== null && value !== undefined) {
              data[key] = value;
            }
          }
          if (statusValue && submitter.name === "status") {
            data.status = statusValue;
          }
          const username = '<?php echo htmlspecialchars($_SESSION['user']['username'] ?? ''); ?>';
          fetch(`/${username}/quest/<?php echo $quest->id; ?>`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then((response) => {
              if (response.ok) {
                window.location.href = `/${username}/quest/<?php echo $quest->slug; ?>`;
              } else {
                alert("Erreur lors de la modification");
              }
            })
            .catch((error) => {
              console.error("Erreur:", error);
              alert("Erreur lors de la modification");
            });
        });
    </script>
</body>

</html>
