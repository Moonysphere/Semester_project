<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    const theme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <title>Modifier
    <?php echo htmlspecialchars($role->name); ?>
  </title>
  <link rel="stylesheet" href="../../src/style/css/framework.css">
  <link rel="stylesheet" href="../../src/style/css/role/edit.css">
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
</head>

<body>
  <div class="container">
    <h1>Modifier
      <?php echo htmlspecialchars($role->name); ?>
    </h1>
    <form id="editForm">
      <div class="form-group">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" value="<?php echo htmlspecialchars($role->name); ?>" required />
      </div>

      <div class="form-group">
        <label for="description">Description :</label>
        <textarea id="description" name="description" required>
<?php echo htmlspecialchars($role->description); ?></textarea>
      </div>
      <div class="buttons">
        <button type="submit" class="btn btn-submit" name="status" value="published">
          Publier
        </button>

        <button type="submit" class="btn btn-draft" name="status" value="draft">
          Brouillon
        </button>

        <button type="submit" class="btn btn-archived" name="status" value="archived">
          Archiver
        </button>

        <a href="/role/<?php echo $role->slug; ?>" class="btn btn-cancel">
          Annuler
        </a>
      </div>
    </form>
  </div>
  <script>
    document
      .getElementById("editForm")
      .addEventListener("submit", function (e) {
        e.preventDefault();

        const submitter = e.submitter;
        const statusValue = submitter ? submitter.value : null;

        // Récupérer tous les champs du formulaire
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);

        // Si un bouton status est cliqué, ajouter/écraser le status
        if (statusValue && submitter.name === "status") {
          data.status = statusValue;
        }

        fetch(`/role/<?php echo $role->id; ?>`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        })
          .then(async (response) => {
            if (!response.ok) {
              throw new Error("Erreur serveur");
            }

            const result = await response.json();

            window.location.href = `/role/${result.slug}`;
          })
          .catch((error) => {
            console.error("Erreur:", error);
            alert("Erreur lors de la modification");
          });
      });
  </script>
</body>

</html>
