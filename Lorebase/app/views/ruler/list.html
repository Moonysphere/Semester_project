<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;

        text-align: center;

        text-align: center;
        margin: 30px 0 10px;

      .characters-container {
        display: grid;

      .character-card {
        border: 1px solid #ddd;

      .character-card:hover {

  <body>
    <h1>Règles</h1>

    <!-- ================= PUBLIÉES ================= -->
    <div class="characters-container">
      <a href="/ruler/create" class="character-card add-card">+</a>

      <?php foreach ($ruler as $ruler): ?>
        <?php if ($ruler->status === 'published'): ?>
          <a
            href="/ruler/<?php echo htmlspecialchars($ruler->slug, ENT_QUOTES, 'UTF-8'); ?>"
            class="character-card"
          >
            <h3><?php echo htmlspecialchars($ruler->name, ENT_QUOTES, 'UTF-8'); ?></h3>
            <p><?php echo htmlspecialchars($ruler->description, ENT_QUOTES, 'UTF-8'); ?></p>
          </a>
        <?php endif; ?>
      <?php endforeach; ?>
    </div>

    <hr style="margin: 40px 0" />

    <!-- ================= BROUILLONS ================= -->
    <h2>Brouillons</h2>
    <div class="characters-container">
      <?php foreach ($ruler as $ruler): ?>

          <a
            href="/ruler/<?php echo htmlspecialchars($ruler->slug, ENT_QUOTES, 'UTF-8'); ?>"
