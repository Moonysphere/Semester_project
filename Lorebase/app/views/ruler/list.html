<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Règles</title>
    <style>
      body {
        font-family: Arial, sans-serif;

      .ruler-card {
        border: 1px solid #ddd;

          box-shadow 0.2s;

        color: inherit;

      .ruler-card:hover {
        transform: translateY(-5px);

  <body>

    <div class="rulers-container">
