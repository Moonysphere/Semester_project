<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><?php echo htmlspecialchars($ruler->name); ?></title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-top: 0;
      }

      .field {
        margin: 15px 0;
      }

      .field label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }

      .field p {
        margin: 0;
        color: #333;
      }

      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
        display: inline-block;
      }

      .btn-back {
        background-color: #007bff;
        color: white;
      }

      .btn-back:hover {
        background-color: #0056b3;
      }

      .btn-delete {
        background-color: #dc3545;
        color: white;
      }

      .btn-delete:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><?php echo htmlspecialchars($ruler->name); ?></h1>

      <div class="field">
        <label>Description :</label>
        <p><?php echo htmlspecialchars($ruler->description); ?></p>
      </div>

      <div class="field">
        <label>categorie :</label>
<p>
        <p><?php echo htmlspecialchars($ruler->categorie); ?></p>
</p>
      </div>
       <div class="field">
        <label>Status :</label>
        <p><?php echo htmlspecialchars($ruler->status); ?></p>
      </div>


      <div class="buttons">
        <a href="/ruler" class="btn btn-back">Retour</a>
        <a
          href="/ruler/<?php echo $ruler->slug; ?>/edit"
          class="btn"
          style="background-color: #ffc107; color: black"
          >Modifier</a
        >
        <button
          type="button"
          class="btn btn-delete"
          onclick="deleteCharacter(<?php echo $ruler->id; ?>)"
        >
          Supprimer
        </button>
      </div>
    </div>

    <script>
      function deleteCharacter(id) {
        if (confirm("Êtes-vous sûr de vouloir supprimer ce personnage ?")) {
          fetch(`/ruler/${id}`, {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
            },
          }).then((response) => {
            if (response.ok) {
              window.location.href = "/ruler";
            } else {
              alert("Erreur lors de la suppression");
            }
          });
        }
      }
    </script>
  </body>
