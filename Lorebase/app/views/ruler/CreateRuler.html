<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer une Règle</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      form {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 5px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #45a049;
      }
      .brouillon {
        background-color: #f0ad4e;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      .brouillon:hover {
        background-color: #ec971f;
      }
      .archived {
        background-color: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Créer une regles</h1>

    <form method="POST" action="/ruler">
      <div class="form-group">
        <label for="name">Titre :</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="description">Description :</label>
        <textarea id="description" name="description"></textarea>
      </div>

      <div class="form-group">
        <label for="categorie">Catégorie :</label>
        <textarea id="categorie" name="categorie"></textarea>
      </div>
      <button class="create" type="submit" name="status" value="published">
        Créer la règle
      </button>
      <button class="brouillon" type="submit" name="status" value="draft">
        Brouillon
      </button>
      <button class="archived" type="submit" name="status" value="archived">
        Archiver
      </button>
    </form>
  </body>
</html>
