<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Lorebase</title>

  <link rel="stylesheet" href="../../src/style/css/auth/login.css">
  <link rel="stylesheet" href="../../src/style/css/framework.css">
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
</head>

<body>
  <div class="login-container">
    <h1>🔐 Connexion</h1>

    <div id="message" class="message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" required placeholder="Votre nom d'utilisateur" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn-login" id="submitBtn">
        Se connecter
      </button>
    </form>

    <p class="register-link">
      Pas encore inscrit ? <a href="/register">Créer un compte</a>
    </p>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const messageDiv = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    // Traduction des erreurs
    const errorMessages = {
      username_required: "Le nom d'utilisateur est requis",
      password_required: "Le mot de passe est requis",
      user_not_found: "Utilisateur non trouvé",
      invalid_password: "Mot de passe incorrect",
      already_logged_in: "Vous êtes déjà connecté",
    };

    function showMessage(type, messages) {
      messageDiv.className = "message " + type;

      if (Array.isArray(messages)) {
        const translated = messages.map((msg) => errorMessages[msg] || msg);
        messageDiv.innerHTML =
          "<ul>" +
          translated.map((m) => "<li>" + m + "</li>").join("") +
          "</ul>";
      } else {
        messageDiv.textContent = messages;
      }
    }

    function setLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span> Connexion...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Se connecter";
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Reset message
      messageDiv.className = "message";
      messageDiv.innerHTML = "";

      setLoading(true);

      const formData = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(formData),
        });

        const data = await response.json();

        if (data.success) {
          showMessage("success", "Connexion réussie ! Redirection...");
          setTimeout(() => {
            window.location.href = "/";
          }, 1000);
        } else {
          showMessage("error", data.errors || ["Une erreur est survenue"]);
        }
      } catch (error) {
        console.error("Erreur:", error);
        showMessage("error", ["Erreur de connexion au serveur"]);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>

</html>
