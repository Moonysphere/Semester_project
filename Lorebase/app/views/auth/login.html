<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Lorebase</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .login-container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }

      .login-container h1 {
        text-align: center;
        color: #1a1a2e;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #4a69bd;
        box-shadow: 0 0 0 3px rgba(74, 105, 189, 0.2);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4a69bd 0%, #1e3799 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(74, 105, 189, 0.4);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .message.error {
        background: #fee2e2;
        color: #dc2626;
        border: 1px solid #fecaca;
        display: block;
      }

      .message.success {
        background: #d1fae5;
        color: #059669;
        border: 1px solid #a7f3d0;
        display: block;
      }

      .message ul {
        margin: 0;
        padding-left: 20px;
      }

      .register-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
      }

      .register-link a {
        color: #4a69bd;
        text-decoration: none;
        font-weight: 500;
      }

      .register-link a:hover {
        text-decoration: underline;
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>🔐 Connexion</h1>

      <div id="message" class="message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="Votre nom d'utilisateur"
          />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="••••••••"
          />
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          Se connecter
        </button>
      </form>

      <p class="register-link">
        Pas encore inscrit ? <a href="/register">Créer un compte</a>
      </p>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const messageDiv = document.getElementById("message");
      const submitBtn = document.getElementById("submitBtn");

      // Traduction des erreurs
      const errorMessages = {
        username_required: "Le nom d'utilisateur est requis",
        password_required: "Le mot de passe est requis",
        user_not_found: "Utilisateur non trouvé",
        invalid_password: "Mot de passe incorrect",
        already_logged_in: "Vous êtes déjà connecté",
      };

      function showMessage(type, messages) {
        messageDiv.className = "message " + type;

        if (Array.isArray(messages)) {
          const translated = messages.map((msg) => errorMessages[msg] || msg);
          messageDiv.innerHTML =
            "<ul>" +
            translated.map((m) => "<li>" + m + "</li>").join("") +
            "</ul>";
        } else {
          messageDiv.textContent = messages;
        }
      }

      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading"></span> Connexion...';
        } else {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Se connecter";
        }
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Reset message
        messageDiv.className = "message";
        messageDiv.innerHTML = "";

        setLoading(true);

        const formData = {
          username: document.getElementById("username").value.trim(),
          password: document.getElementById("password").value,
        };

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          const data = await response.json();

          if (data.success) {
            showMessage("success", "Connexion réussie ! Redirection...");
            setTimeout(() => {
              window.location.href = "/";
            }, 1000);
          } else {
            showMessage("error", data.errors || ["Une erreur est survenue"]);
          }
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("error", ["Erreur de connexion au serveur"]);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
