<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - Lorebase</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .register-container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      .register-container h1 {
        text-align: center;
        color: #1a1a2e;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #4a69bd;
        box-shadow: 0 0 0 3px rgba(74, 105, 189, 0.2);
      }

      .form-row {
        display: flex;
        gap: 15px;
      }

      .form-row .form-group {
        flex: 1;
      }

      .btn-register {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4a69bd 0%, #1e3799 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(74, 105, 189, 0.4);
      }

      .btn-register:active {
        transform: translateY(0);
      }

      .btn-register:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .message.error {
        background: #fee2e2;
        color: #dc2626;
        border: 1px solid #fecaca;
        display: block;
      }

      .message.success {
        background: #d1fae5;
        color: #059669;
        border: 1px solid #a7f3d0;
        display: block;
      }

      .message ul {
        margin: 0;
        padding-left: 20px;
      }

      .login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
      }

      .login-link a {
        color: #4a69bd;
        text-decoration: none;
        font-weight: 500;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <h1>📚 Inscription</h1>

      <div id="message" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur *</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="Ex: axel_lore"
          />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Ex: axel@example.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe * (min. 8 caractères)</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            placeholder="••••••••"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="nom">Nom</label>
            <input
              type="text"
              id="nom"
              name="nom"
              placeholder="Ex: BARBELLION"
            />
          </div>

          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input
              type="text"
              id="prenom"
              name="prenom"
              placeholder="Ex: Axel"
            />
          </div>
        </div>

        <button type="submit" class="btn-register" id="submitBtn">
          Créer mon compte
        </button>
      </form>

      <p class="login-link">Déjà inscrit ? <a href="/login">Se connecter</a></p>
    </div>

    <script>
      const form = document.getElementById("registerForm");
      const messageDiv = document.getElementById("message");
      const submitBtn = document.getElementById("submitBtn");

      // Traduction des erreurs
      const errorMessages = {
        username_required: "Le nom d'utilisateur est requis",
        email_required: "L'email est requis",
        email_invalid: "L'email n'est pas valide",
        password_required: "Le mot de passe est requis",
        password_too_short:
          "Le mot de passe doit contenir au moins 8 caractères",
        username_taken: "Ce nom d'utilisateur est déjà pris",
        email_taken: "Cet email est déjà utilisé",
        already_logged_in: "Vous êtes déjà connecté",
        db_error: "Erreur serveur, veuillez réessayer",
      };

      function showMessage(type, messages) {
        messageDiv.className = "message " + type;

        if (Array.isArray(messages)) {
          const translated = messages.map((msg) => errorMessages[msg] || msg);
          messageDiv.innerHTML =
            "<ul>" +
            translated.map((m) => "<li>" + m + "</li>").join("") +
            "</ul>";
        } else {
          messageDiv.textContent = messages;
        }
      }

      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading"></span> Inscription...';
        } else {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Créer mon compte";
        }
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Reset message
        messageDiv.className = "message";
        messageDiv.innerHTML = "";

        setLoading(true);

        const formData = {
          username: document.getElementById("username").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          nom: document.getElementById("nom").value.trim(),
          prenom: document.getElementById("prenom").value.trim(),
        };

        try {
          const response = await fetch("/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          const data = await response.json();

          if (data.success) {
            showMessage("success", "Compte créé avec succès ! Redirection...");
            setTimeout(() => {
              window.location.href = "/login";
            }, 1500);
          } else {
            showMessage("error", data.errors || ["Une erreur est survenue"]);
          }
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("error", ["Erreur de connexion au serveur"]);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
