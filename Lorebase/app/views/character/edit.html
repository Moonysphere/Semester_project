    <style>
      body {
        font-family: Arial, sans-serif;

      }
      .container {
        max-width: 600px;

        margin: 20px 0;
      }
      label {
        display: block;

      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }
      .btn {
        padding: 10px 20px;
        border: none;

      }
      .btn-submit {
        background-color: #28a745;

      }
      .btn-submit:hover {
        background-color: #218838;
      }
      .btn-draft {
        background-color: #f0ad4e;
        color: white;
      }
      .btn-draft:hover {
        background-color: #ec971f;
      }
      .btn-archived {
        background-color: #dc3545;
        color: white;
      }
      .btn-archived:hover {
        background-color: #c82333;
      }
      .btn-cancel {
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        display: inline-block;
      }
      .btn-cancel:hover {
        background-color: #5a6268;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Modifier <?php echo htmlspecialchars($character->name); ?></h1>
      <form id="editForm">
        <div class="form-group">
          <label for="name">Nom :</label>
          <input
            type="text"
            id="name"
            name="name"
            value="<?php echo htmlspecialchars($character->name); ?>"
            required />
        </div>
        <div class="form-group">
          <label for="role">Rôle :</label>
          <input
            type="text"
            id="role"
            name="role"
            value="<?php echo htmlspecialchars($character->role); ?>"
            required />
        </div>
        <div class="form-group">
          <label for="origin">Origine :</label>
          <input
            type="text"
            id="origin"
            name="origin"
            value="<?php echo htmlspecialchars($character->origin); ?>"
            required />
        </div>
        <div class="form-group">
          <label for="pv">Points de vie :</label>
          <input
            type="number"
            id="pv"
            name="pv"
            value="<?php echo htmlspecialchars($character->pv); ?>"
            required />
        </div>
        <div class="form-group">
          <label for="description">Description :</label>
          <textarea id="description" name="description" required>
<?php echo htmlspecialchars($character->description); ?></textarea
          >
        </div>
        <div class="buttons">
          <button
            type="submit"
            class="btn btn-submit"
            name="status"
            value="published">
            Publier
          </button>

          <button
            type="submit"
            class="btn btn-draft"
            name="status"
            value="draft">
            Brouillon
          </button>

          <button
            type="submit"
            class="btn btn-archived"
            name="status"
            value="archived">
            Archiver
          </button>

          <a
            href="/character/<?php echo $character->id; ?>"
            class="btn btn-cancel"
            >Annuler</a
          >
        </div>
      </form>
    </div>
    <script>
      document
        .getElementById("editForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const submitter = e.submitter;
          const statusValue = submitter ? submitter.value : null;

          // Récupérer tous les champs du formulaire
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);

          // Si un bouton status est cliqué, ajouter/écraser le status
          if (statusValue && submitter.name === "status") {
            data.status = statusValue;
          }

          // Envoyer tous les champs + le status
          fetch(`/character/<?php echo $character->id; ?>`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then((response) => {
              if (response.ok) {
                window.location.href = `/character/<?php echo $character->id; ?>`;
              } else {
                alert("Erreur lors de la modification");
              }
            })
            .catch((error) => {
              console.error("Erreur:", error);
              alert("Erreur lors de la modification");
            });
        });
    </script>
  </body>
</html>
