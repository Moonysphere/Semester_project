  <link rel="stylesheet" href="../../src/style/css/framework.css">
  <link rel="stylesheet" href="../../src/style/css/character/detail.css">
  <link rel="stylesheet" href="../../src/style/css/theme.css">
  <link rel="stylesheet" href="../../src/style/css/responsive.css">
</head>

<body>
  <div class="container">
    <h1>
      <?php echo htmlspecialchars($character->name); ?>
    </h1>

    <div class="field">
      <label>Rôle :</label>
      <p>
        <?= htmlspecialchars($roleName ?? 'Non défini') ?>
      </p>
    </div>

    <div class="field">
      <label>Origine :</label>
      <p>
        <?= htmlspecialchars($character->origin) ?>
      </p>
    </div>

      <label>Points de vie :</label>
      <p>
        <?= htmlspecialchars($character->pv) ?>
      </p>
    </div>

    <div class="field">
      <label>Description :</label>
      <p>
        <?= htmlspecialchars($character->description) ?>
      </p>
    </div>

      <p>

      </p>

      <label>Univers :</label>
      <p>
        <?= htmlspecialchars($universName ?? 'Non défini') ?>
      </p>
    </div>

    <div class="field">
      <label>Univers :</label>
      <p>
        <?php echo htmlspecialchars($character->univers_id); ?>
      </p>
    </div>

    <div class="buttons">
      <a href="/character" class="btn btn-back">Retour</a>
      <a href="/character/<?php echo $character->slug; ?>/edit" class="btn"
        style="background-color: #ffc107; color: black">Modifier</a>
      <button type="button" class="btn btn-delete" onclick="deleteCharacter(<?php echo $character->id; ?>)">
        Supprimer
      </button>
    </div>
  </div>

  <script>
    function deleteCharacter(id) {
      if (confirm("Êtes-vous sûr de vouloir supprimer ce personnage ?")) {
        fetch(`/character/${id}`, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
          },
        }).then((response) => {
          if (response.ok) {
            window.location.href = "/character";
          } else {
            alert("Erreur lors de la suppression");
          }
        });
      }
    }
  </script>
</body>
