<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const theme =
        localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light");
      document.documentElement.setAttribute("data-theme", theme);
    </script>
    <link rel="stylesheet" href="../../src/style/css/framework.css" />
    <link rel="stylesheet" href="../../src/style/css/place/detail.css" />
    <link rel="stylesheet" href="../../src/style/css/theme.css" />
    <link rel="stylesheet" href="../../src/style/css/responsive.css" />
    <title><?php echo htmlspecialchars($place->name); ?></title>
  </head>

  <body>
    <div class="container">
      <h1><?php echo htmlspecialchars($place->name); ?></h1>

      <div class="field">
        <label>Description :</label>
        <p><?php echo htmlspecialchars($place->description); ?></p>
      </div>
      <div class="field">
        <label>Univers :</label>
        <p><?= htmlspecialchars($universName ?? 'Non défini') ?></p>
      </div>
      <div class="field">
        <label>Status :</label>
        <p><?php echo htmlspecialchars($place->status); ?></p>
      </div>

      <div class="buttons">
        <?php if (isset($_SESSION['user']) &&
        isset($_SESSION['user']['username'])): ?>
        <a
          href="/<?php echo htmlspecialchars($_SESSION['user']['username']); ?>/place"
          class="btn btn-back"
          >Retour</a
        >
        <?php else: ?>
        <a href="/place" class="btn btn-back">Retour</a>
        <?php endif; ?> <?php if (isset($isOwnEntity) && $isOwnEntity): ?>
        <a
          href="/<?php echo htmlspecialchars($_SESSION['user']['username'] ?? ''); ?>/place/<?php echo $place->slug; ?>/edit"
          class="btn"
          style="background-color: #ffc107; color: black"
          >Modifier</a
        >
        <button
          type="button"
          class="btn btn-delete"
          onclick="deletePlace(<?php echo $place->id; ?>)"
        >
          Supprimer
        </button>
        <?php endif; ?>
      </div>
    </div>

    <script>
      function deletePlace(id) {
        if (confirm("Êtes-vous sûr de vouloir supprimer cette place ?")) {
          const username =
            '<?php echo htmlspecialchars($_SESSION["user"]["username"] ?? ""); ?>';
          fetch(`/${username}/place/${id}`, {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
            },
          }).then((response) => {
            if (response.ok || response.status === 302) {
              window.location.href = `/${username}/place`;
            } else {
              alert("Erreur lors de la suppression");
            }
          });
        }
      }
    </script>
  </body>
</html>
