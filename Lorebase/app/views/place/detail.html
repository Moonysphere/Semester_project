      </button>
    </div>
  </div>

  <script>
    function deletePlace(id) {
      if (confirm("Êtes-vous sûr de vouloir supprimer cette place ?")) {
        fetch(`/place/${id}`, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
          },
        }).then((response) => {
          if (response.ok) {
            window.location.href = "/place";
          } else {
            alert("Erreur lors de la suppression");
          }
        });
      }
    }
  </script>
