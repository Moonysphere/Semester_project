<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const theme =
        localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light");
      document.documentElement.setAttribute("data-theme", theme);
    </script>
    <title>Modifier <?php echo htmlspecialchars($place->name); ?></title>
    <link rel="stylesheet" href="../../src/style/css/framework.css" />
    <link rel="stylesheet" href="../../src/style/css/place/edit.css" />
    <link rel="stylesheet" href="../../src/style/css/theme.css" />
    <link rel="stylesheet" href="../../src/style/css/responsive.css" />
  </head>

  <body>
    <h1>Modifier <?php echo htmlspecialchars($place->name); ?></h1>

    <form id="editForm">
      <div class="form-group">
        <label for="name">Nom :</label>
        <input
          type="text"
          id="name"
          name="name"
          value="<?php echo htmlspecialchars($place->name); ?>"
          required
        />
      </div>
      <div class="form-group">
        <label for="type">Type:</label>
        <input
          type="text"
          id="type"
          name="type"
          value="<?php echo htmlspecialchars($place->type); ?>"
          required
        />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input
          type="text"
          id="description"
          name="description"
          value="<?php echo htmlspecialchars($place->description); ?>"
          required
        />
      </div>
      <div class="form-group">
        <label for="univers_id">Univers</label>
        <select id="univers_id" name="univers_id" required>
          <option value="">-- Choisir un univers --</option>
          <?php foreach ($universes as $univers): ?>
          <option
            value="<?= $univers->id ?>"
            title="<?= htmlspecialchars($univers->description ?? '') ?>"
          >
            <?= htmlspecialchars($univers->name) ?>
          </option>
          <?php endforeach; ?>
        </select>
      </div>
      <div class="form-actions">
        <a
          href="/<?php echo htmlspecialchars($_SESSION['user']['username'] ?? ''); ?>/place/<?php echo $place->slug; ?>"
          class="btn-cancel"
        >
          Annuler
        </a>
        <button class="create" type="submit" name="status" value="published">
          Publier
        </button>
        <button class="brouillon" type="submit" name="status" value="draft">
          Brouillon
        </button>
        <button class="archived" type="submit" name="status" value="archived">
          Archiver
        </button>
      </div>
    </form>

    <script>
      document
        .getElementById("editForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const submitter = e.submitter;
          const statusValue = submitter ? submitter.value : null;

          // Récupérer tous les champs du formulaire
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);

          // Si un bouton status est cliqué, ajouter/écraser le status
          if (statusValue && submitter.name === "status") {
            data.status = statusValue;
          }

          // Envoyer tous les champs + le status
          const username =
            '<?php echo htmlspecialchars($_SESSION["user"]["username"] ?? ""); ?>';
          const placeId = <?php echo $place->id; ?>;

          fetch(`/${username}/place/${placeId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then(async (response) => {
              if (!response.ok) {
                throw new Error("Erreur serveur");
              }

              const result = await response.json();

              window.location.href = `/${username}/place/${result.slug}`;
            })
            .catch((error) => {
              console.error("Erreur:", error);
              alert("Erreur lors de la modification");
            });
        });
    </script>
  </body>
</html>
