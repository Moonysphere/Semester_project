<!-- Sidebar Component -->
<div class="sidebar-container">
  <style>
    .sidebar-container {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 1000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .sidebar {
      height: 100%;
      background-color: #1f2937;
      color: white;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      width: 256px;
    }

    .sidebar.closed {
      width: 56px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      min-height: 64px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      overflow: hidden;
      flex: 1;
    }

    .sidebar-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .sidebar-logo-text {
      font-weight: 600;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .sidebar.closed .sidebar-logo-text {
      opacity: 0;
      width: 0;
    }

    .sidebar-toggle {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-toggle:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .sidebar-toggle svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .sidebar.closed .sidebar-toggle svg {
      transform: rotate(180deg);
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .sidebar-item {
      position: relative;
      margin: 0.25rem 0.5rem;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
      cursor: pointer;
    }

    .sidebar-link:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .sidebar-link.active {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .sidebar-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .sidebar-text {
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .sidebar.closed .sidebar-text {
      opacity: 0;
      width: 0;
    }

    .sidebar-divider {
      height: 1px;
      background-color: rgba(255, 255, 255, 0.1);
      margin: 0.5rem 1rem;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
    }

    /* Tooltip */
    .sidebar.closed .sidebar-item:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      background-color: #1f2937;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      white-space: nowrap;
      margin-left: 0.5rem;
      font-size: 0.875rem;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* Mobile overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar-container {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar-container.mobile-open {
        transform: translateX(0);
      }

      .sidebar-container.mobile-open~.sidebar-overlay {
        display: block;
      }

      .sidebar {
        width: 256px !important;
      }
    }
  </style>

  <div class="sidebar" id="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">A</div>
        <span class="sidebar-logo-text">Application</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
          <path d="M9 4v16"></path>
          <path d="M14 10l2 2l-2 2"></path>
        </svg>
      </button>
    </div>

    <!-- Menu -->
    <nav class="sidebar-menu">
      <!-- Home -->
      <div class="sidebar-item" data-tooltip="Accueil">
        <a href="#home" class="sidebar-link active">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
            <path
              d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z">
            </path>
          </svg>
          <span class="sidebar-text">Accueil</span>

      <!-- Dashboard -->
      <div class="sidebar-item" data-tooltip="Tableau de bord">
        <a href="#dashboard" class="sidebar-link">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M3 9h18"></path>
            <path d="M9 21V9"></path>
          </svg>
          <span class="sidebar-text">Tableau de bord</span>
        </a>
      </div>

      <!-- Projects -->
      <div class="sidebar-item" data-tooltip="Projets">
        <a href="#projects" class="sidebar-link">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M3 7m0 2a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"></path>
            <path d="M8 7v-2a2 2 0 0 1 2 -2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          <span class="sidebar-text">Projets</span>
        </a>
      </div>

      <!-- Messages -->
      <div class="sidebar-item" data-tooltip="Messages">
        <a href="#messages" class="sidebar-link">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M8 9h8"></path>
            <path d="M8 13h6"></path>
            <path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12z">
            </path>
          </svg>
          <span class="sidebar-text">Messages</span>
        </a>
      </div>

      <!-- Divider -->
      <div class="sidebar-divider"></div>

      <!-- Settings -->
      <div class="sidebar-item" data-tooltip="Paramètres">
        <a href="#settings" class="sidebar-link">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94-1.543.826-3.31 2.37-2.37c1 .608 2.296.07 2.572-1.065z">
            </path>
            <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
          </svg>
          <span class="sidebar-text">Paramètres</span>
        </a>
      </div>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-item" data-tooltip="Déconnexion">
        <a href="#logout" class="sidebar-link">
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2">
            </path>
            <path d="M9 12h12l-3 -3"></path>
            <path d="M18 15l3 -3"></path>
          </svg>
          <span class="sidebar-text">Déconnexion</span>
        </a>
      </div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
  // Toggle sidebar
  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarContainer = document.querySelector('.sidebar-container');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('closed');

    // Dispatch event pour ajuster le contenu principal
    window.dispatchEvent(new CustomEvent('sidebar-toggle', {
      detail: { isClosed: sidebar.classList.contains('closed') }
    }));
  });

  // Fermer sur mobile avec overlay
  sidebarOverlay.addEventListener('click', () => {
    sidebarContainer.classList.remove('mobile-open');
  });

  // Active link
  const links = document.querySelectorAll('.sidebar-link');
  links.forEach(link => {
    link.addEventListener('click', function (e) {
      links.forEach(l => l.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>
