<script>
  const sidebar = document.getElementById("sidebar");
  const sidebarToggle = document.getElementById("sidebarToggle");
  const sidebarContainer = document.getElementById("sidebarContainer");
  const body = document.body;

  const wasClosed = localStorage.getItem("sidebarClosed") === "true";
  if (wasClosed) {
    sidebar.classList.add("closed");
    body.classList.add("sidebar-closed");
  }

  sidebarToggle.addEventListener("click", () => {
    sidebar.classList.toggle("closed");
    body.classList.toggle("sidebar-closed");
    localStorage.setItem("sidebarClosed", sidebar.classList.contains("closed"));
  });

  const sidebarBurger = document.getElementById("sidebarBurger");
  const sidebarOverlay = document.getElementById("sidebarOverlay");

  function openMobileSidebar() {
    sidebarContainer.classList.add("mobile-open");
    sidebarOverlay.classList.add("active");
    sidebarBurger.setAttribute("aria-expanded", "true");
  }

  function closeMobileSidebar() {
    sidebarContainer.classList.remove("mobile-open");
    sidebarOverlay.classList.remove("active");
    sidebarBurger.setAttribute("aria-expanded", "false");
  }

  sidebarBurger.addEventListener("click", () => {
    sidebarContainer.classList.contains("mobile-open")
      ? closeMobileSidebar()
      : openMobileSidebar();
  });

  sidebarOverlay.addEventListener("click", closeMobileSidebar);

  const links = document.querySelectorAll(".sidebar-link");
  const currentPath = window.location.pathname;

  links.forEach((link) => {
    if (link.href) {
      const linkPath = new URL(link.href, location.origin).pathname;
      if (linkPath === currentPath) {
        links.forEach((l) => l.classList.remove("active"));
        link.classList.add("active");
      }
    }
  });

  links.forEach((link) => {
    link.addEventListener("click", function () {
      links.forEach((l) => l.classList.remove("active"));
      this.classList.add("active");
      localStorage.setItem("activeLink", this.href);
    });
  });
</script>

<script type="module">
  class ThemeToggle {
    constructor() {
      this.theme = localStorage.getItem("theme") || this._getSystemTheme();
      this.button = null;
      this.init();
    }

    _getSystemTheme() {
      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }

    init() {
      this.applyTheme(this.theme);

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => this._setup());
      } else {
        this._setup();
      }
    }

    _setup() {
      this.createButton();
      this.setupEventListeners();
    }

    createButton() {
      const footer = document.getElementById("sidebarFooter");
      if (!footer) {
        console.warn("[ThemeToggle] #sidebarFooter introuvable");
        return;
      }
      if (document.getElementById("themeToggle")) {
        console.warn("[ThemeToggle] Bouton déjà présent");
        return;
      }

      const item = document.createElement("div");
      item.classList.add("sidebar-item");
      item.setAttribute(
        "data-tooltip",
        this.theme === "dark" ? "Mode clair" : "Mode sombre",
      );

      this.button = document.createElement("button");
      this.button.classList.add("sidebar-link", "sidebar-theme-toggle");
      this.button.id = "themeToggle";
      this.button.setAttribute("aria-label", "Changer le thème");

      const icon = document.createElement("span");
      icon.classList.add("sidebar-icon", "sidebar-theme-icon");
      icon.textContent = this.theme === "dark" ? "☀️" : "🌙";

      const label = document.createElement("span");
      label.classList.add("sidebar-text");
      label.textContent = this.theme === "dark" ? "Mode clair" : "Mode sombre";

      this.button.appendChild(icon);
      this.button.appendChild(label);
      item.appendChild(this.button);

      footer.insertBefore(item, footer.firstChild);
    }

    setupEventListeners() {
      if (this.button) {
        this.button.addEventListener("click", () => this.toggleTheme());
      }
    }

    toggleTheme() {
      this.button.classList.add("rotating");

      this.theme = this.theme === "light" ? "dark" : "light";
      this.applyTheme(this.theme);
      localStorage.setItem("theme", this.theme);

      const icon = this.button.querySelector(".sidebar-theme-icon");
      const label = this.button.querySelector(".sidebar-text");
      const item = this.button.closest(".sidebar-item");

      if (icon) icon.textContent = this.theme === "dark" ? "☀️" : "🌙";
      if (label)
        label.textContent =
          this.theme === "dark" ? "Mode clair" : "Mode sombre";
      if (item)
        item.setAttribute(
          "data-tooltip",
          this.theme === "dark" ? "Mode clair" : "Mode sombre",
        );

      setTimeout(() => this.button.classList.remove("rotating"), 600);
    }

    applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
    }
  }

  new ThemeToggle();


</script>
